<!DOCTYPE html>
<html>
<head>
  <title>Four Columns</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <div class="row">
      <div class="col-sm-3 bg-primary text-white p-3">One</div>
      <div class="col-sm-3 bg-success text-white p-3">Two</div>
      <div class="col-sm-3 bg-warning p-3">Three</div>
      <div class="col-sm-3 bg-danger text-white p-3">Four</div>
    </div>
  </div>
</body>
</html>
