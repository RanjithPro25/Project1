<!DOCTYPE html>
<html>
<head>
  <title>Container Row Col</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <div class="row">
      <div class="col-sm-6 col-md-4 bg-info p-3">Box 1</div>
      <div class="col-sm-6 col-md-4 bg-light p-3">Box 2</div>
      <div class="col-sm-6 col-md-4 bg-secondary text-white p-3">Box 3</div>
    </div>
  </div>
</body>
</html>
